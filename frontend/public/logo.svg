<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="50%" style="stop-color:#00cc6a"/>
      <stop offset="100%" style="stop-color:#009950"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#00b8d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="20"/>
  
  <!-- Binary code background -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="url(#codeGrad)" opacity="0.25">
    <text x="15" y="35">1010100110</text>
    <text x="280" y="35">0110101100</text>
    <text x="15" y="65">0011010111</text>
    <text x="280" y="65">1101010011</text>
    <text x="15" y="95">1110010001</text>
    <text x="280" y="95">0001110101</text>
    <text x="15" y="125">0100101110</text>
    <text x="280" y="125">1010110010</text>
    <text x="15" y="155">1001100101</text>
    <text x="280" y="155">0110001100</text>
    <text x="15" y="185">0011110010</text>
    <text x="280" y="185">1100101001</text>
    <text x="15" y="215">0111011000</text>
    <text x="280" y="215">1000010111</text>
    <text x="15" y="245">1100110101</text>
    <text x="280" y="245">0011100110</text>
    <text x="15" y="275">1011000110</text>
    <text x="280" y="275">0100111010</text>
    <text x="15" y="305">0110100011</text>
    <text x="280" y="305">1001011100</text>
    <text x="15" y="335">0010010110</text>
    <text x="280" y="335">1101100100</text>
    <text x="15" y="365">1110100011</text>
    <text x="280" y="365">0001001011</text>
    <text x="15" y="395">1001110100</text>
    <text x="280" y="395">0110011101</text>
  </g>
  
  <!-- DR.CODE text with glow -->
  <text x="200" y="220" 
        font-family="'JetBrains Mono', 'Fira Code', monospace" 
        font-weight="bold" 
        font-size="90" 
        fill="url(#textGrad)"
        text-anchor="middle"
        filter="url(#glow)"
        style="text-shadow: 0 0 40px rgba(0,229,255,0.6);">
    DR.CODE
  </text>
  
  <!-- Underline accent -->
  <rect x="70" y="240" width="260" height="5" rx="2.5" fill="url(#codeGrad)"/>
  
  <!-- Corner brackets -->
  <g stroke="url(#textGrad)" stroke-width="5" fill="none" opacity="0.7" stroke-linecap="round">
    <path d="M 45 45 L 45 70 L 70 70"/>
    <path d="M 330 45 L 355 45 L 355 70"/>
    <path d="M 45 330 L 70 330 L 70 355"/>
    <path d="M 330 330 L 355 330 L 355 355"/>
  </g>
  
  <!-- Decorative dots -->
  <g fill="#00e5ff" opacity="0.4">
    <circle cx="200" cy="280" r="3"/>
    <circle cx="185" cy="280" r="2"/>
    <circle cx="215" cy="280" r="2"/>
  </g>
</svg>