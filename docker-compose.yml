services:
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"  # Exposed for host-side health checks and local dev
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/whoshotu/dr-code-ii-backend:latest
    container_name: drcode-backend
    ports:
      - "${BACKEND_PORT:-8002}:${BACKEND_PORT:-8002}"
    env_file:
      - .env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    entrypoint: ["sh", "-c", "pip install --no-cache-dir -r requirements.txt && uvicorn server:app --host 0.0.0.0 --port ${BACKEND_PORT:-8002}"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8002}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ghcr.io/whoshotu/dr-code-ii-frontend:latest
    container_name: drcode-frontend
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    env_file:
      - .env.docker
    depends_on:
      - backend
    restart: unless-stopped

# SQLite-native architecture: no additional database services required.
# Persistent data stored in ./data volume via SQLite.

volumes:
  ollama:
