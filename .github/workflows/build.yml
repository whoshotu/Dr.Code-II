name: Build & Push

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Prepare Docker Env
        run: |
          echo "MONGO_URL=${{ secrets.MONGO_URL }}" > .env.docker
          echo "OLLAMA_BASE_URL=${{ secrets.OLLAMA_BASE_URL }}" >> .env.docker
          echo "OLLAMA_MODEL=${{ secrets.OLLAMA_MODEL }}" >> .env.docker
          echo "DB_NAME=drcode" >> .env.docker
      
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/whoshotu/dr-code-v2-backend:latest
          no-cache: true
      
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/whoshotu/dr-code-v2-frontend:latest
          no-cache: true
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}

  build-pr:
    name: Build PR (No Push)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Prepare Docker Env
        run: |
          echo "MONGO_URL=${{ secrets.MONGO_URL }}" > .env.docker
          echo "OLLAMA_BASE_URL=${{ secrets.OLLAMA_BASE_URL }}" >> .env.docker
          echo "OLLAMA_MODEL=${{ secrets.OLLAMA_MODEL }}" >> .env.docker
          echo "DB_NAME=drcode" >> .env.docker
      
      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: ghcr.io/whoshotu/dr-code-v2-backend:pr-${{ github.event.pull_request.number }}
          load: true
      
      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: false
          tags: ghcr.io/whoshotu/dr-code-v2-frontend:pr-${{ github.event.pull_request.number }}
          load: true

  success:
    name: Build Complete
    needs: [build-and-push, build-pr]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Result
        run: |
          echo "✅ Build complete!"
          echo ""
          echo "Pre-built images:"
          echo "  ghcr.io/whoshotu/dr-code-v2-backend:latest"
          echo "  ghcr.io/whoshotu/dr-code-v2-frontend:latest"
