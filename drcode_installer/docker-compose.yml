services:
  mongo:
    image: mongo:7
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand({ ping: 1 }).ok' | mongosh localhost:27017/test --quiet | grep 1 >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    image: ghcr.io/whoshotu/dr-code-v2-backend:latest
    pull_policy: always
    ports:
      - "127.0.0.1:8002:8002"
    env_file:
      - .env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/whoshotu/dr-code-v2-frontend:latest
    pull_policy: always
    ports:
      - "127.0.0.1:3001:80"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8002
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
